<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="comic_reader">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>comic_reader</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Custom bootstrap: load CanvasKit from the same origin (the "canvaskit/"
    folder that `flutter build web` already bundles into the output) instead
    of the default https://www.gstatic.com/flutter-canvaskit/... CDN. Google's
    CDN is unreliable/blocked on some networks (observed as
    net::ERR_QUIC_PROTOCOL_ERROR / QUIC_NETWORK_IDLE_TIMEOUT), which breaks
    web app startup entirely. Serving CanvasKit locally removes that external
    dependency.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    {{flutter_js}}
    {{flutter_build_config}}
    _flutter.loader.load({
      config: {
        canvasKitBaseUrl: "canvaskit/",
      },
    });
  </script>
</body>
</html>
